allowBuilds:
  esbuild: false

# pnpm v11 reads project-level settings from pnpm-workspace.yaml (not from
# .npmrc, which pnpm v11.1.3 no longer merges for non-auth keys).
#
# minimumReleaseAge: 0 disables pnpm v11's supply-chain freshness policy
#   so Renovate bumps to recently-published deps (vendor patch releases
#   within 24h of publish) don't block installs or husky pre-commit hooks.
# verifyDepsBeforeRun: false suppresses the deps-status check that fires
#   before every `pnpm <script>` invocation. The check is noise here
#   because lockfiles are routinely briefly stale (mentat-pull-all.sh
#   deletes lockfiles before each build cycle).
minimumReleaseAge: 0
verifyDepsBeforeRun: false
